<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- PWA Meta Tags (Mobile Web App Capable) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="记得吃药">
    <meta name="mobile-web-app-capable" content="yes">

    <title>记得吃药</title>

    <!-- SVG Icon (ChuMe Pill theme) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23C8E6C9'/><path d='M30 50 a20 20 0 0 1 40 0 v0 a20 20 0 0 1 -40 0 z' fill='%23F2A19B'/><path d='M30 50 v0 a20 20 0 0 0 40 0 z' fill='white'/></svg>">
    <link rel="apple-touch-icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23C8E6C9'/><path d='M30 50 a20 20 0 0 1 40 0 v0 a20 20 0 0 1 -40 0 z' fill='%23F2A19B'/><path d='M30 50 v0 a20 20 0 0 0 40 0 z' fill='white'/></svg>">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 啾咪全局样式 -->
    <link rel="stylesheet" href="global.css">

    <!-- 统一 Tailwind 配置（啾咪设计系统） -->
    <script src="tailwind-config.js"></script>

    <style>
        /* Transition classes mapped perfectly for JS toggle */
        .sheet-visible {
            transform: translateY(0);
        }

        .sheet-hidden {
            transform: translateY(100%);
        }

        .backdrop-visible {
            opacity: 1;
            pointer-events: auto;
        }

        .backdrop-hidden {
            opacity: 0;
            pointer-events: none;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .tab-item {
            min-height: 50px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        @keyframes slowBlink {

            0%,
            100% {
                opacity: 1;
                color: #ef4444;
            }

            50% {
                opacity: 0;
                color: #ef4444;
            }
        }

        .animate-error-blink {
            animation: slowBlink 0.6s ease-in-out 2;
            color: #ef4444 !important;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen min-h-[100dvh] bg-chume-cream sm:bg-[#E8DED4] sm:py-4 transition-colors duration-300">

    <div id="app-container">

        <!-- Header -->
        <header
            class="pt-12 pb-4 px-6 bg-white sticky top-0 z-20 border-b border-chume-brown/10 flex items-end backdrop-blur-md bg-white/90 justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html"
                    class="w-10 h-10 flex items-center justify-center rounded-xl bg-chume-card text-chume-brown active:scale-90 transition-transform mb-0.5">
                    <i class="fa-solid fa-chevron-left text-lg"></i>
                </a>
                <h1 class="text-3xl font-bold text-chume-brown tracking-tight font-title">我的药箱</h1>
            </div>

            <!-- 全局操作区 -->
            <div id="global-actions" class="flex space-x-2 mb-0.5">
                <button id="btn-mode-add"
                    class="w-10 h-10 flex items-center justify-center rounded-xl bg-chume-card text-chume-brown-light hover:text-chume-brown active:scale-95 transition-all outline-none">
                    <i class="fa-solid fa-plus text-[15px]"></i>
                </button>
                <button id="btn-mode-manage"
                    class="w-10 h-10 flex items-center justify-center rounded-xl bg-chume-card text-chume-brown-light hover:text-chume-brown active:scale-95 transition-all outline-none">
                    <i class="fa-solid fa-pencil text-[15px]"></i>
                </button>
                <button id="btn-mode-delete"
                    class="w-10 h-10 flex items-center justify-center rounded-xl bg-chume-card text-chume-brown-light hover:text-chume-brown active:scale-95 transition-all outline-none">
                    <i class="fa-solid fa-trash-can text-[15px]"></i>
                </button>
            </div>
            <div id="global-actions-active" class="hidden flex space-x-2 mb-0.5">
                <button id="btn-mode-cancel"
                    class="px-4 h-10 flex items-center justify-center rounded-xl bg-chume-card text-chume-brown-light font-bold text-[15px] active:scale-95 transition-all outline-none">
                    取消
                </button>
                <button id="btn-mode-done"
                    class="px-4 h-10 flex items-center justify-center rounded-xl bg-chume-orange-light text-chume-orange font-bold text-[15px] active:scale-95 transition-all outline-none">
                    完成
                </button>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="px-5 pb-3 bg-white/90 backdrop-blur-md sticky top-[80px] z-10 border-b border-chume-brown/10">
            <div class="relative">
                <div
                    class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-chume-brown-light">
                    <i class="fa-solid fa-magnifying-glass text-lg"></i>
                </div>
                <input type="text" id="search-input"
                    class="w-full bg-chume-card border border-transparent rounded-card py-2.5 pl-10 pr-10 text-[15px] outline-none focus:bg-white focus:ring-2 focus:ring-chume-orange/30 transition-all placeholder-chume-brown-light text-chume-brown"
                    placeholder="搜索药品名称或品牌...">
                <button id="search-clear"
                    class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-chume-brown-light hover:text-chume-brown active:scale-95 transition-transform hidden">
                    <i class="fa-solid fa-circle-xmark text-lg"></i>
                </button>
            </div>
        </div>

        <!-- Main Content (Medication List) -->
        <main class="flex-1 overflow-y-auto px-5 py-5 space-y-4 bg-chume-card pb-28" id="med-list">
            <!-- JS will inject cards here -->
        </main>

        <!-- Fixed Bottom Navigation Bar -->
        <nav class="fixed bottom-0 w-full max-w-[430px] bg-white/95 backdrop-blur-md border-t border-chume-brown/10 pb-safe pt-2 px-2 flex justify-around z-30"
            style="padding-bottom: max(env(safe-area-inset-bottom), 1.5rem);">
            <!-- Tab 1: 服药提醒 (Inactive) -->
            <a href="med-reminders.html"
                class="tab-item text-chume-brown-light hover:text-chume-brown active:scale-95 transition-transform">
                <i class="fa-solid fa-bell text-xl"></i>
                <span class="text-[11px] font-semibold mt-1">服药提醒</span>
            </a>

            <!-- Tab 2: 我的药箱 (Active) -->
            <a href="medicine.html" class="tab-item text-chume-orange active:scale-95 transition-transform">
                <i class="fa-solid fa-pills text-xl"></i>
                <span class="text-[11px] font-bold mt-1">我的药箱</span>
            </a>
        </nav>

        <!-- Bottom Sheet (Form Modal) -->
        <!-- Backdrop -->
        <div id="form-backdrop"
            class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 backdrop-hidden transition-opacity duration-300 max-w-[430px] mx-auto">
        </div>

        <!-- Sheet Container -->
        <div id="form-sheet"
            class="fixed bottom-0 w-full max-w-[430px] bg-white rounded-t-3xl shadow-soft z-50 sheet-hidden transition-transform duration-300 flex flex-col max-h-[90vh]">

            <!-- Drag Handle Indicator -->
            <div class="w-full flex justify-center pt-3 pb-2">
                <div class="w-12 h-1.5 bg-chume-card rounded-full"></div>
            </div>

            <!-- Form Header -->
            <div class="px-6 pb-4 pt-2 flex justify-between items-center border-b border-chume-brown/10">
                <h2 id="form-title" class="text-xl font-bold text-chume-brown font-title">新增药品</h2>
                <button id="btn-close-form"
                    class="w-8 h-8 flex items-center justify-center rounded-full bg-chume-card text-chume-brown-light active:scale-95 transition-transform">
                    <div class="icon-container"><i class="fa-solid fa-xmark"></i></div>
                </button>
            </div>

            <!-- Scrollable Form Area -->
            <div class="overflow-y-auto px-6 py-5 flex-1 space-y-5">
                <form id="med-form" class="space-y-5">
                    <input type="hidden" id="field-id">

                    <!-- Segmented Control (Tabs) -->
                    <div class="bg-chume-card p-1 rounded-xl flex items-center w-full mb-6">
                        <button type="button" id="tab-btn-manual"
                            class="bg-white shadow-card text-chume-brown transition-all duration-300 rounded-lg py-2 text-sm font-semibold w-1/2">
                            手动填写
                        </button>
                        <button type="button" id="tab-btn-history"
                            class="text-chume-brown-light hover:text-chume-brown transition-all duration-300 rounded-lg py-2 text-sm font-semibold w-1/2">
                            历史模板
                        </button>
                    </div>

                    <!-- Manual Entry Area -->
                    <div id="tab-manual" class="space-y-5">
                        <!-- Name -->
                        <div>
                            <label class="block text-sm font-medium text-chume-brown mb-1.5">药品名称 <span
                                    class="text-chume-pink">*</span></label>
                            <input type="text" id="field-name" required
                                class="w-full bg-chume-card border border-chume-brown/10 rounded-card px-4 py-3.5 outline-none focus:bg-white focus:ring-2 focus:ring-chume-orange/30 transition-all min-h-[44px] text-chume-brown">
                        </div>

                        <!-- Brand -->
                        <div>
                            <label class="block text-sm font-medium text-chume-brown mb-1.5">品牌</label>
                            <input type="text" id="field-brand"
                                class="w-full bg-chume-card border border-chume-brown/10 rounded-card px-4 py-3.5 outline-none focus:bg-white focus:ring-2 focus:ring-chume-orange/30 transition-all min-h-[44px] text-chume-brown"
                                placeholder="如: Swisse">
                        </div>

                        <!-- Date Row 1 -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-chume-brown mb-1.5">购买日期</label>
                                <div
                                    class="relative flex items-center bg-chume-card border border-chume-brown/10 rounded-card px-4 py-3.5 focus-within:bg-white focus-within:ring-2 focus-within:ring-chume-orange/30 transition-all min-h-[44px]">
                                    <input type="tel" id="field-purchaseDate-display"
                                        class="flex-1 bg-transparent outline-none placeholder-chume-brown-light p-0 m-0 border-none focus:ring-0 text-[15px] tracking-widest text-chume-brown font-medium"
                                        placeholder="年 / 月 / 日">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-chume-brown mb-1.5">开封日期</label>
                                <div
                                    class="relative flex items-center bg-chume-card border border-chume-brown/10 rounded-card px-4 py-3.5 focus-within:bg-white focus-within:ring-2 focus-within:ring-chume-orange/30 transition-all min-h-[44px]">
                                    <input type="tel" id="field-openDate-display"
                                        class="flex-1 bg-transparent outline-none placeholder-chume-brown-light p-0 m-0 border-none focus:ring-0 text-[15px] tracking-widest text-chume-brown font-medium"
                                        placeholder="年 / 月 / 日">
                                </div>
                            </div>
                        </div>

                        <!-- Date Row 2 (Produce & Expire) -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-chume-brown mb-1.5">生产日期</label>
                                <div
                                    class="relative flex items-center bg-chume-card border border-chume-brown/10 rounded-card px-4 py-3.5 focus-within:bg-white focus-within:ring-2 focus-within:ring-chume-orange/30 transition-all min-h-[44px]">
                                    <input type="tel" id="field-produceDate-display"
                                        class="flex-1 bg-transparent outline-none placeholder-chume-brown-light p-0 m-0 border-none focus:ring-0 text-[15px] tracking-widest text-chume-brown font-medium"
                                        placeholder="年 / 月 / 日">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-chume-brown mb-1.5">到期时间 <span
                                        class="text-chume-pink">*</span></label>
                                <div
                                    class="relative flex items-center bg-chume-card border border-chume-brown/10 rounded-card px-4 py-3.5 focus-within:bg-white focus-within:ring-2 focus-within:ring-chume-pink/30 transition-all min-h-[44px]">
                                    <input type="tel" required id="field-expireDate-display"
                                        class="flex-1 bg-transparent outline-none placeholder-chume-brown-light p-0 m-0 border-none focus:ring-0 text-[15px] tracking-widest text-chume-brown font-medium"
                                        placeholder="年 / 月 / 日">
                                </div>
                            </div>
                        </div>

                        <!-- 保质期计算区 -->
                        <div class="bg-chume-orange-light/30 border border-chume-orange/20 rounded-card p-4">
                            <!-- Header区 -->
                            <div id="calc-header" class="flex justify-between items-center cursor-pointer">
                                <div class="flex items-center space-x-2">
                                    <div class="icon-container text-chume-orange"><i class="fa-solid fa-calculator"></i>
                                    </div>
                                    <span class="text-sm font-bold text-chume-brown">保质期计算器 (点我展开)</span>
                                </div>
                                <i id="calc-icon"
                                    class="fa-solid fa-chevron-down text-chume-brown-light transition-transform duration-300"></i>
                            </div>

                            <!-- Body区 -->
                            <div id="calc-body" class="hidden space-y-4 mt-3 pt-3 border-t border-chume-orange/10">
                                <div>
                                    <label
                                        class="block text-[11px] leading-tight font-medium text-chume-orange mb-1.5 opacity-90">先填写生产日期后再选择保质期，自动填到期时间！</label>
                                    <div class="grid grid-cols-4 gap-2">
                                        <button type="button"
                                            class="shelf-life-chip px-3 py-1.5 bg-white border border-chume-brown/10 rounded-full text-xs text-chume-brown-light active:scale-95 transition-all focus:outline-none"
                                            data-months="12">12个月</button>
                                        <button type="button"
                                            class="shelf-life-chip px-3 py-1.5 bg-white border border-chume-brown/10 rounded-full text-xs text-chume-brown-light active:scale-95 transition-all focus:outline-none"
                                            data-months="18">18个月</button>
                                        <button type="button"
                                            class="shelf-life-chip px-3 py-1.5 bg-white border border-chume-brown/10 rounded-full text-xs text-chume-brown-light active:scale-95 transition-all focus:outline-none"
                                            data-months="24">24个月</button>
                                        <button type="button"
                                            class="shelf-life-chip px-3 py-1.5 bg-white border border-chume-brown/10 rounded-full text-xs text-chume-brown-light active:scale-95 transition-all focus:outline-none"
                                            data-months="36">36个月</button>
                                    </div>
                                    <div class="mt-3"><input type="number" id="field-customShelfLife"
                                            placeholder="手动输入其他月数..."
                                            class="w-full bg-white border border-chume-brown/10 rounded-xl px-3 py-2 outline-none focus:ring-2 focus:ring-chume-orange/30 transition-all text-xs text-center text-chume-brown min-h-[40px]">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Capacity & Stock -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-chume-brown mb-1.5">包装总量 <span
                                        class="text-chume-pink">*</span></label>
                                <input type="number" id="field-capacity" inputmode="decimal" required step="any"
                                    class="w-full bg-chume-card border border-chume-brown/10 rounded-card px-4 py-3.5 outline-none focus:bg-white focus:ring-2 focus:ring-chume-orange/30 transition-all min-h-[44px] text-chume-brown"
                                    placeholder="如: 120">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-chume-brown mb-1.5">当前余量 <span
                                        class="text-chume-pink">*</span></label>
                                <input type="number" id="field-stock" inputmode="decimal" required step="any"
                                    class="w-full bg-chume-card border border-chume-brown/10 rounded-card px-4 py-3.5 outline-none focus:bg-white focus:ring-2 focus:ring-chume-orange/30 transition-all min-h-[44px] text-chume-brown"
                                    placeholder="如: 100">
                            </div>
                        </div>

                        <!-- Unit Selection Row -->
                        <div>
                            <label class="block text-sm font-medium text-chume-brown mb-1.5">计量单位 <span
                                    class="text-chume-pink">*</span></label>
                            <div class="flex items-center space-x-2 overflow-x-auto pb-1 no-scrollbar">
                                <button type="button"
                                    class="unit-chip shrink-0 px-4 py-2 bg-white border border-chume-brown/10 rounded-full text-sm text-chume-brown-light active:scale-95 transition-all focus:outline-none font-medium">粒</button>
                                <button type="button"
                                    class="unit-chip shrink-0 px-4 py-2 bg-white border border-chume-brown/10 rounded-full text-sm text-chume-brown-light active:scale-95 transition-all focus:outline-none font-medium">片</button>
                                <button type="button"
                                    class="unit-chip shrink-0 px-4 py-2 bg-white border border-chume-brown/10 rounded-full text-sm text-chume-brown-light active:scale-95 transition-all focus:outline-none font-medium">克</button>
                                <button type="button"
                                    class="unit-chip shrink-0 px-4 py-2 bg-white border border-chume-brown/10 rounded-full text-sm text-chume-brown-light active:scale-95 transition-all focus:outline-none font-medium">包</button>
                                <button type="button"
                                    class="unit-chip shrink-0 px-4 py-2 bg-white border border-chume-brown/10 rounded-full text-sm text-chume-brown-light active:scale-95 transition-all focus:outline-none font-medium">条</button>
                                <input type="text" id="field-unit-custom"
                                    class="shrink-0 w-20 bg-chume-card border border-chume-brown/10 rounded-full px-3 py-2 outline-none focus:bg-white focus:ring-2 focus:ring-chume-orange/30 transition-all text-sm text-center min-h-[36px] text-chume-brown"
                                    placeholder="其他...">
                            </div>
                        </div>

                        <!-- 加号成分与剂量模块 -->
                        <div class="border-t border-chume-brown/10 pt-5 mt-2">
                            <div class="flex justify-between items-center mb-3">
                                <label class="block text-sm font-medium text-chume-brown">成分与剂量 (选填)</label>
                                <button type="button" id="btn-add-ingredient"
                                    class="text-chume-orange text-sm font-bold active:scale-95 transition-transform flex items-center">
                                    <div class="icon-container mr-1"><i class="fa-solid fa-plus"></i></div> 添加成分
                                </button>
                            </div>
                            <!-- 成分列表容器 -->
                            <div id="ingredients-container" class="space-y-3">
                                <!-- JS动态插入行 -->
                            </div>
                        </div>
                    </div>

                    <!-- History Template Area -->
                    <div id="tab-history" class="hidden">
                        <div class="text-center text-sm text-chume-brown-light py-10">历史模板加载中...</div>
                    </div>
                </form>
            </div>

            <!-- Action Area (Sticky Bottom within Sheet) -->
            <div class="p-6 pt-2 bg-white pb-8">
                <button id="btn-save"
                    class="w-full bg-chume-orange text-white rounded-card py-4 font-bold text-[17px] active:scale-95 transition-transform shadow-soft hover:bg-[#F59030]">
                    保存记录
                </button>
            </div>
        </div>
    </div>

    <script src="components.js"></script>
    <script src="medicine-refactored.js"></script>
</body>

</html>
