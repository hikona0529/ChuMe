<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>喝水设置</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 啾咪全局样式 -->
    <link rel="stylesheet" href="global.css">

    <!-- 统一 Tailwind 配置（啾咪设计系统） -->
    <script src="tailwind-config.js"></script>
</head>

<body class="flex items-center justify-center min-h-screen min-h-[100dvh] bg-chume-cream sm:bg-[#E8DED4] sm:py-4 transition-colors duration-300">

    <!-- Container -->
    <div id="app-container" class="bg-chume-card">

        <!-- Navigation Bar -->
        <div
            class="h-24 bg-white/80 backdrop-blur-md sticky top-0 z-20 flex flex-col justify-end pb-3 px-4 shadow-card border-b border-chume-brown/10">
            <div class="flex justify-between items-end relative">
                <!-- Back Button -->
                <a href="water.html" class="text-chume-orange flex items-center gap-1 active:opacity-50">
                    <i class="fas fa-chevron-left text-lg"></i>
                    <span class="text-lg font-title">返回</span>
                </a>

                <!-- Title -->
                <h1
                    class="font-semibold text-lg absolute left-1/2 transform -translate-x-1/2 bottom-1 text-chume-brown font-title">
                    喝水设置</h1>

                <!-- Save Button -->
                <button onclick="saveWaterSettings()"
                    class="text-chume-orange font-bold active:opacity-50 text-lg font-title">
                    保存
                </button>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto px-4 py-6 hide-scrollbar">

            <div class="bg-white rounded-card overflow-hidden shadow-card mb-6">
                <div class="px-4 py-3 border-b border-chume-brown/10 bg-chume-cream/20">
                    <div class="text-chume-brown font-semibold">目标设置</div>
                    <div class="text-xs text-chume-brown-light mt-0.5">用于我爱喝水首页的目标和默认杯量</div>
                </div>
                <div class="divide-y divide-chume-brown/10">
                    <div class="flex items-center px-4 py-3">
                        <span class="text-chume-brown font-medium shrink-0">总目标</span>
                        <div class="flex-1 flex items-center justify-end">
                            <input type="number" id="set-goal-total"
                                class="w-24 outline-none text-right placeholder-chume-brown-light bg-transparent text-chume-brown font-num"
                                placeholder="未设置">
                            <span class="text-sm text-chume-brown-light ml-1 font-title">ml</span>
                        </div>
                    </div>
                    <div class="flex items-center px-4 py-3">
                        <span class="text-chume-brown font-medium shrink-0">电解质</span>
                        <div class="flex-1 flex items-center justify-end">
                            <input type="number" id="set-goal-elec"
                                class="w-24 outline-none text-right placeholder-chume-brown-light bg-transparent text-chume-brown font-num"
                                placeholder="未设置">
                            <span class="text-sm text-chume-brown-light ml-1 font-title">ml</span>
                        </div>
                    </div>
                    <div class="flex items-center px-4 py-3">
                        <span class="text-chume-brown font-medium shrink-0">默认杯量</span>
                        <div class="flex-1 flex items-center justify-end">
                            <input type="number" id="set-default-vol"
                                class="w-24 outline-none text-right placeholder-chume-brown-light bg-transparent text-chume-brown font-num"
                                placeholder="未设置">
                            <span class="text-sm text-chume-brown-light ml-1 font-title">ml</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script src="utils.js"></script>
    <script src="water-settings.js"></script>
</body>

</html>
