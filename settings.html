<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>设置</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 啾咪全局样式 -->
    <link rel="stylesheet" href="global.css">

    <!-- 统一 Tailwind 配置（啾咪设计系统） -->
    <script src="tailwind-config.js"></script>
</head>

<body class="flex items-center justify-center min-h-screen min-h-[100dvh] bg-chume-cream sm:bg-[#E8DED4] sm:py-4 transition-colors duration-300">

    <!-- Container -->
    <div id="app-container" class="bg-chume-card">

        <!-- Navigation Bar -->
        <div
            class="h-24 bg-chume-card/90 backdrop-blur-md sticky top-0 z-20 flex flex-col justify-end pb-3 px-4 shadow-card border-b border-chume-brown/10">
            <div class="flex justify-between items-end">
                <!-- Back Button -->
                <a href="index.html" class="text-chume-orange flex items-center gap-1 active:opacity-50">
                    <i class="fas fa-chevron-left text-lg"></i>
                    <span class="text-lg font-title">返回</span>
                </a>

                <!-- Title -->
                <h1
                    class="font-semibold text-lg absolute left-1/2 transform -translate-x-1/2 bottom-3 text-chume-brown font-title">
                    设置</h1>

                <!-- Save Button -->
                <button onclick="saveSettings()"
                    class="text-chume-orange font-bold active:opacity-50 text-lg font-title">
                    保存
                </button>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto px-4 py-6">

            <!-- Group 1: Profile -->
            <div class="bg-white rounded-card overflow-hidden shadow-card mb-6">
                <!-- Nickname Input -->
                <div class="flex items-center px-4 py-3 border-b border-chume-brown/10">
                    <span class="w-20 text-chume-brown font-medium">昵称</span>
                    <input type="text" id="nickname-input"
                        class="flex-1 outline-none text-right placeholder-chume-brown-light bg-transparent text-chume-brown"
                        placeholder="你的名字">
                </div>
                <!-- Gender Input -->
                <div class="flex items-center justify-between px-4 py-3 border-b border-chume-brown/10">
                    <span class="text-chume-brown font-medium shrink-0">性别</span>
                    <div class="flex items-center bg-chume-card p-1 rounded-lg w-[120px] text-xs">
                        <input type="hidden" id="gender-input" value="">
                        <button onclick="setSettingsGender('1')" id="btn-gender-1" class="flex-1 py-1.5 text-center rounded-md font-medium text-chume-brown-light hover:text-chume-brown transition-all">男生</button>
                        <button onclick="setSettingsGender('2')" id="btn-gender-2" class="flex-1 py-1.5 text-center rounded-md font-medium text-chume-brown-light hover:text-chume-brown transition-all">女生</button>
                    </div>
                </div>
                <!-- Height Input -->
                <div class="flex items-center px-4 py-3">
                    <span class="w-20 text-chume-brown font-medium">身高</span>
                    <div class="flex-1 flex items-center justify-end">
                        <input type="number" id="height-input"
                            class="w-20 outline-none text-right placeholder-chume-brown-light bg-transparent text-chume-brown font-num"
                            placeholder="填写数值">
                        <span class="text-sm text-chume-brown-light ml-1 font-title">cm</span>
                    </div>
                </div>
            </div>

            <!-- Group 2: Backup & Restore -->
            <div class="bg-white rounded-card overflow-hidden shadow-card mb-6">
                <!-- Export Backup -->
                <button onclick="exportGlobalData()"
                    class="w-full flex items-center justify-between px-4 py-3 border-b border-chume-brown/10 active:bg-chume-card transition-colors">
                    <span class="text-chume-orange font-medium">导出完整备份</span>
                    <i class="fas fa-file-export text-chume-orange/70"></i>
                </button>
                <!-- Import Backup -->
                <button onclick="triggerImport()"
                    class="w-full flex items-center justify-between px-4 py-3 active:bg-chume-card transition-colors">
                    <span class="text-chume-brown font-medium">从完整备份恢复</span>
                    <i class="fas fa-file-import text-chume-brown-light"></i>
                </button>
            </div>

            <!-- 隐藏的文件选择器 -->
            <input type="file" id="import-file" accept=".json" class="hidden">

            <!-- Group 3: Reset -->
            <div class="bg-white rounded-card overflow-hidden shadow-card">
                <button id="btn-reset" onclick="handleReset()"
                    class="w-full text-center text-chume-pink py-3 active:bg-chume-card font-medium">
                    重置所有数据
                </button>
            </div>

            <p class="mt-4 text-center text-xs text-chume-brown-light">
                ChuMe v1.0.0
            </p>

        </div>

    </div>

    <script src="utils.js"></script>
    <script src="settings.js"></script>
</body>

</html>
