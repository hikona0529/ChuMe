<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拍图数药</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 啾咪全局样式 -->
    <link rel="stylesheet" href="global.css">

    <!-- 统一 Tailwind 配置（啾咪设计系统） -->
    <script src="tailwind-config.js"></script>

    <style>
        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen min-h-[100dvh] bg-chume-cream sm:bg-[#E8DED4] sm:py-4 transition-colors duration-300">

    <!-- Container -->
    <div id="app-container" class="bg-chume-card flex flex-col relative">

        <!-- 导航栏 -->
        <div
            class="h-24 bg-chume-card/90 backdrop-blur-md sticky top-0 z-20 flex flex-col justify-end pb-3 px-4 shadow-card border-b border-chume-brown/10 shrink-0">
            <div class="flex justify-between items-end">
                <!-- 取消按钮 -->
                <a id="btn-counter-back" href="index.html" class="text-chume-orange flex items-center gap-1 active:opacity-50">
                    <i class="fas fa-chevron-left text-lg"></i>
                    <span id="counter-back-label" class="text-lg font-title">返回桌面</span>
                </a>

                <!-- 标题 -->
                <h1
                    class="font-semibold text-lg absolute left-1/2 transform -translate-x-1/2 bottom-3 text-chume-brown font-title">
                    拍图数药</h1>

                <!-- 占位 -->
                <div class="w-12"></div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="flex-1 overflow-y-auto px-4 py-6 flex flex-col items-center pb-24">

            <!-- 上传触发区（默认显示） -->
            <div id="upload-area" class="flex flex-col items-center justify-center py-12 w-full">
                <button id="btn-upload"
                    class="w-40 h-40 rounded-3xl bg-white shadow-card flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform border-2 border-dashed border-chume-brown/20 hover:border-chume-orange/40">
                    <span class="text-5xl">📸</span>
                    <span class="text-sm font-medium text-chume-brown font-title">拍照 / 上传图片</span>
                </button>
                <p class="text-xs text-chume-brown-light mt-4">建议少量多次，每次拍摄一小堆药片</p>
            </div>

            <!-- 隐藏文件选择器 -->
            <input type="file" accept="image/*" id="ai-count-file" class="hidden">

            <!-- 预览区 -->
            <div id="preview-container" class="hidden w-full flex-col items-center">
                <p class="text-sm font-medium text-chume-brown font-title mb-2">点击图片进入全屏标点模式</p>
                <!-- 利用 flex 外壳居中，canvas 使用 max 高宽属性自适应长宽比，避免坐标漂移 -->
                <canvas id="preview-canvas" class="max-w-full max-h-64 rounded-2xl shadow-card bg-white cursor-pointer transition-transform active:scale-[0.98]"></canvas>
            </div>

            <!-- 数药历史记录卡片 -->
            <div id="history-card" class="w-full mt-6 bg-white rounded-2xl shadow-card overflow-hidden">
                <!-- 卡片头部 -->
                <div class="flex items-center justify-between px-4 pt-4 pb-2 border-b border-chume-brown/10">
                    <h2 class="text-sm font-semibold text-chume-brown font-title flex items-center gap-1.5">
                        <span>📋</span>
                        <span>拍图数药记录</span>
                    </h2>
                </div>
                <!-- 记录列表容器 -->
                <div id="history-list">
                    <div class="px-4 py-5 text-center text-xs text-chume-brown-light">
                        还没有拍图数药记录
                    </div>
                </div>
            </div>

        </div>

        <!-- 底部固定控制台（有图片预览时显示） -->
        <div id="bottom-console" class="hidden shrink-0 bg-white border-t border-chume-brown/10 px-4 pt-4 pb-6 absolute bottom-0 w-full z-10 shadow-[0_-4px_10px_rgba(0,0,0,0.03)] rounded-b-[40px] sm:rounded-b-[40px]">
            <!-- 数据展示 -->
            <div class="flex items-center justify-center gap-4 mb-4">
                <div class="text-sm text-chume-brown">
                    本轮标定：<span id="round-count" class="font-num font-bold text-chume-orange text-lg">0</span>
                </div>
                <div class="w-px h-4 bg-chume-brown/20"></div>
                <div class="text-sm text-chume-brown">
                    累计：<span id="total-count" class="font-num font-bold text-chume-orange text-lg">0</span>
                </div>
            </div>
            <!-- 按钮组 -->
            <div class="flex gap-3">
                <button id="btn-next-round"
                    class="flex-1 py-3 rounded-2xl bg-chume-card text-chume-brown font-medium active:scale-95 transition-transform text-sm">
                    继续下一拍
                </button>
                <button id="btn-done"
                    class="flex-1 py-3 rounded-2xl bg-chume-orange text-white font-medium active:scale-95 transition-transform shadow-sm text-sm">
                    数完了，填入
                </button>
            </div>
        </div>

    </div>

    <!-- 全屏沉浸标点模态框 -->
    <div id="fullscreen-mark-modal" class="fixed inset-0 z-50 bg-black flex flex-col hidden">
        <!-- 顶部提示区 -->
        <div class="h-14 flex items-center justify-center text-white/80 text-sm shrink-0 bg-black/60 font-title tracking-wide border-b border-white/10">
            点击药片标点，点击红点取消
        </div>
        
        <!-- 核心画布区 -->
        <div class="flex-1 relative overflow-hidden flex items-center justify-center p-0 bg-[#111]">
            <canvas id="fullscreen-canvas" class="max-w-full max-h-full touch-none select-none"></canvas>
        </div>
        
        <!-- 底部操作区 -->
        <div class="h-24 bg-gray-900 border-t border-white/10 flex items-center justify-between px-6 shrink-0 pb-safe">
            <div class="text-white text-lg font-title">
                已标: <span id="fullscreen-count" class="font-bold text-chume-orange text-3xl font-num ml-2">0</span>
            </div>
            <button id="btn-finish-mark" class="px-6 py-3 rounded-2xl bg-chume-orange text-white font-medium active:scale-95 transition-transform text-base shadow-lg shadow-chume-orange/20">
                ✅ 完成标点
            </button>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="ai-counter.js"></script>
</body>

</html>
