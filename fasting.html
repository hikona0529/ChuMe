<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>轻断食</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 啾咪全局样式 -->
    <link rel="stylesheet" href="global.css">

    <!-- 统一 Tailwind 配置（啾咪设计系统） -->
    <script src="tailwind-config.js"></script>

    <style>
        /* Smooth Transitions */
        .transition-all-300 {
            transition: all 0.3s ease-in-out;
        }

        /* Progress Ring */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.5s ease, stroke 0.3s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* 啾咪暖色渐变 — 断食期 */
        .bg-gradient-fasting {
            background: linear-gradient(135deg, #FF9F43 0%, #E8847C 100%);
        }

        /* 啾咪暖色渐变 — 进食期 */
        .bg-gradient-eating {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        }

        .text-gradient-fasting {
            background: linear-gradient(135deg, #FF9F43 0%, #E8847C 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-eating {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Buttons */
        .btn-ios {
            transition: transform 0.1s;
        }

        .btn-ios:active {
            transform: scale(0.96);
        }

        /* Input Numeric */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
            appearance: none;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen min-h-[100dvh] bg-chume-cream sm:bg-[#E8DED4] sm:py-4 transition-colors duration-300">
    <div id="app-container">
        <!-- Header -->
        <div
            class="h-14 flex items-center px-4 bg-white/80 backdrop-blur-md sticky top-0 z-20 border-b border-chume-brown/10">
            <a href="index.html" class="flex items-center text-chume-orange gap-1 btn-ios">
                <i class="fas fa-chevron-left"></i>
                <span class="font-medium font-title">返回</span>
            </a>
            <h1 class="absolute left-1/2 -translate-x-1/2 font-semibold text-lg text-chume-brown font-title">轻断食</h1>
        </div>

        <!-- Main Content -->
        <div id="main-content"
            class="flex-1 flex flex-col p-6 items-center animate-fade-in overflow-y-auto hide-scrollbar">

            <!-- Top: Status & Mode -->
            <div class="flex flex-col items-center gap-2 w-full">
                <div id="status-badge"
                    class="px-4 py-1.5 rounded-full bg-chume-card text-chume-brown-light font-bold text-sm tracking-wide shadow-card transition-all-300">
                    准备就绪
                </div>

                <!-- Mode Selector -->
                <div id="mode-panel" class="w-full transition-all duration-300">
                    <div id="mode-selector" class="flex gap-2 mt-4 w-full">
                        <button onclick="setMode('16+8')" id="btn-mode-16"
                            class="flex-1 py-3 rounded-card bg-white border border-chume-brown/10 shadow-card text-chume-brown-light font-bold text-sm btn-ios hover:bg-chume-card transition-colors border-chume-orange text-chume-orange bg-chume-orange-light">16+8</button>
                        <button onclick="setMode('18+6')" id="btn-mode-18"
                            class="flex-1 py-3 rounded-card bg-white border border-chume-brown/10 shadow-card text-chume-brown-light font-bold text-sm btn-ios hover:bg-chume-card transition-colors">18+6</button>
                        <button onclick="setMode('20+4')" id="btn-mode-20"
                            class="flex-1 py-3 rounded-card bg-white border border-chume-brown/10 shadow-card text-chume-brown-light font-bold text-sm btn-ios hover:bg-chume-card transition-colors">20+4</button>
                        <button onclick="setMode('custom')" id="btn-mode-custom"
                            class="flex-1 py-3 rounded-card bg-white border border-chume-brown/10 shadow-card text-chume-brown-light font-bold text-sm btn-ios hover:bg-chume-card transition-colors">自定义</button>
                    </div>
                    <!-- Custom Inputs -->
                    <div id="custom-config"
                        class="hidden mt-3 bg-white p-3 rounded-card border border-chume-brown/10 shadow-card flex gap-4">
                        <div class="flex-1">
                            <label class="text-[10px] text-chume-brown-light font-bold uppercase">断食(小时)</label>
                            <input type="number" id="in-fast-h" value="16" oninput="updateEstimates()"
                                class="w-full mt-1 bg-chume-card rounded-lg py-1.5 text-center font-bold text-chume-brown outline-none focus:ring-2 focus:ring-chume-orange/30">
                        </div>
                        <div class="flex-1">
                            <label class="text-[10px] text-chume-brown-light font-bold uppercase">进食(小时)</label>
                            <input type="number" id="in-eat-h" value="8" oninput="updateEstimates()"
                                class="w-full mt-1 bg-chume-card rounded-lg py-1.5 text-center font-bold text-chume-brown outline-none focus:ring-2 focus:ring-chume-orange/30">
                        </div>
                    </div>
                    <!-- Start Time -->
                    <div id="start-time-config"
                        class="mt-3 bg-white p-3 rounded-card border border-chume-brown/10 shadow-card flex items-center justify-between">
                        <span class="text-xs font-bold text-chume-brown-light">开始时间</span>
                        <input type="datetime-local" id="in-start-time" oninput="updateEstimates()"
                            class="bg-chume-card text-chume-brown text-xs font-bold py-1.5 px-3 rounded-lg outline-none border-none">
                    </div>
                </div>
            </div>

            <!-- Middle: Progress Ring -->
            <div class="relative w-64 h-64 mt-4 mb-4 flex items-center justify-center flex-shrink-0">
                <svg class="w-full h-full" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="54" fill="none" class="stroke-chume-card" stroke-width="8" />
                    <circle id="progress-circle" cx="60" cy="60" r="54" fill="none" stroke="currentColor"
                        stroke-width="8" stroke-linecap="round" class="progress-ring__circle text-chume-orange"
                        stroke-dasharray="339.292" stroke-dashoffset="339.292" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                    <div id="timer-label" class="text-xs font-semibold text-chume-brown-light mb-1">倒计时</div>
                    <div id="timer-display"
                        class="text-5xl font-bold text-chume-brown tabular-nums tracking-tighter font-num">
                        --:--:--</div>
                    <div id="timer-percent" class="text-sm font-medium text-chume-brown-light mt-1 font-num">0%</div>
                </div>
            </div>

            <!-- Bottom: Time Info Cards -->
            <div class="grid grid-cols-2 gap-4 w-full mb-6">
                <div
                    class="bg-white p-4 rounded-card shadow-card border border-chume-brown/5 flex flex-col items-center ml-1">
                    <span class="text-xs text-chume-brown-light mb-1">开始时间</span>
                    <span id="start-time-text" class="text-sm font-bold text-chume-brown font-num">--:--</span>
                </div>
                <div
                    class="bg-white p-4 rounded-card shadow-card border border-chume-brown/5 flex flex-col items-center mr-1">
                    <span id="label-end-time" class="text-xs text-chume-brown-light mb-1">预计结束</span>
                    <span id="end-time-text" class="text-sm font-bold text-chume-brown font-num">--:--</span>
                </div>
            </div>

            <!-- Action Button -->
            <button id="main-btn" onclick="handleMainBtn()"
                class="w-full h-14 rounded-full bg-gradient-fasting text-white font-bold text-lg shadow-soft btn-ios flex items-center justify-center gap-2 flex-shrink-0">
                <i class="fas fa-play"></i>
                <span>开始断食</span>
            </button>
            <button id="reset-btn" onclick="resetState()"
                class="mt-3 text-chume-brown-light text-xs font-medium underline hidden">重置状态</button>

            <!-- History Section -->
            <div class="w-full mt-8">
                <h3
                    class="text-xs font-bold text-chume-brown-light uppercase tracking-wider mb-3 pl-2 flex items-center gap-1">
                    <i class="fas fa-history"></i> 历史记录
                </h3>
                <div id="history-list" class="space-y-3 pb-8 w-full"></div>
            </div>
        </div>

        <!-- EDIT MODAL -->
        <div id="edit-modal"
            class="hidden absolute inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
            <div class="bg-white w-full max-w-sm rounded-card p-6 shadow-soft relative">
                <h3 class="text-lg font-bold text-chume-brown mb-6 text-center font-title">编辑记录</h3>

                <div class="space-y-4">
                    <div class="bg-chume-orange-light/50 p-3 rounded-card border border-chume-orange/20">
                        <div class="flex items-center gap-2 mb-2 text-chume-orange">
                            <i class="fas fa-leaf text-xs"></i>
                            <span class="text-xs font-bold uppercase tracking-wide">断食期</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] text-chume-brown-light block mb-1">开始时间</label>
                                <input type="datetime-local" id="edit-fs"
                                    class="w-full bg-white rounded-lg px-2 py-1.5 text-xs font-bold text-chume-brown border border-chume-brown/10 focus:border-chume-orange outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] text-chume-brown-light block mb-1">结束时间</label>
                                <input type="datetime-local" id="edit-fe"
                                    class="w-full bg-white rounded-lg px-2 py-1.5 text-xs font-bold text-chume-brown border border-chume-brown/10 focus:border-chume-orange outline-none">
                            </div>
                        </div>
                    </div>

                    <div class="bg-[#FFF8E1]/50 p-3 rounded-card border border-[#FFE082]/30">
                        <div class="flex items-center gap-2 mb-2 text-[#F5A623]">
                            <i class="fas fa-utensils text-xs"></i>
                            <span class="text-xs font-bold uppercase tracking-wide">进食期</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] text-chume-brown-light block mb-1">开始时间</label>
                                <input type="datetime-local" id="edit-es"
                                    class="w-full bg-white rounded-lg px-2 py-1.5 text-xs font-bold text-chume-brown border border-chume-brown/10 focus:border-[#F5A623] outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] text-chume-brown-light block mb-1">结束时间</label>
                                <input type="datetime-local" id="edit-ee"
                                    class="w-full bg-white rounded-lg px-2 py-1.5 text-xs font-bold text-chume-brown border border-chume-brown/10 focus:border-[#F5A623] outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3 mt-6">
                    <button onclick="closeEditModal()"
                        class="flex-1 py-3.5 rounded-card bg-chume-card text-chume-brown-light font-bold text-sm hover:bg-chume-cream transition-colors">取消</button>
                    <button onclick="saveEdit()"
                        class="flex-1 py-3.5 rounded-card bg-chume-orange text-white font-bold text-sm shadow-soft hover:bg-[#F59030] transition-colors">保存修改</button>
                </div>
            </div>
        </div>

    </div>

    <script src="fasting.js"></script>
</body>

</html>
