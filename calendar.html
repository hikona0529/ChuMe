<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>打卡日历</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <script src="tailwind-config.js"></script>
</head>

<body class="flex items-center justify-center min-h-screen min-h-[100dvh] bg-chume-cream sm:bg-[#E8DED4] sm:py-4 transition-colors duration-300">
    <div id="app-container" class="bg-chume-card">
        <header
            class="h-24 bg-white/85 backdrop-blur-md sticky top-0 z-20 flex flex-col justify-end pb-3 px-4 shadow-card border-b border-chume-brown/10">
            <div class="flex justify-between items-end relative">
                <a href="index.html" class="text-chume-orange flex items-center gap-1 active:opacity-50">
                    <i class="fas fa-chevron-left text-lg"></i>
                    <span class="text-lg font-title">返回</span>
                </a>
                <h1
                    class="absolute left-1/2 transform -translate-x-1/2 bottom-1 font-semibold text-lg text-chume-brown font-title">
                    打卡日历
                </h1>
                <a href="settings.html"
                    class="w-9 h-9 rounded-full flex items-center justify-center text-chume-orange active:bg-chume-orange-light">
                    <i class="fas fa-sliders text-lg"></i>
                </a>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto hide-scrollbar px-4 py-4 pb-8">
            <section class="bg-white rounded-card shadow-card border border-chume-brown/10 overflow-hidden">
                <div class="flex items-center justify-between px-4 py-3 border-b border-chume-brown/10 bg-white">
                    <button id="calendar-prev-month"
                        class="w-9 h-9 rounded-full bg-chume-card text-chume-orange flex items-center justify-center active:scale-95">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div class="flex flex-col items-center">
                        <div id="calendar-month-title" class="text-lg font-bold text-chume-brown font-title"></div>
                        <button id="calendar-today"
                            class="mt-1 text-xs text-chume-orange font-semibold active:opacity-60">回到今天</button>
                    </div>
                    <button id="calendar-next-month"
                        class="w-9 h-9 rounded-full bg-chume-card text-chume-orange flex items-center justify-center active:scale-95">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>

                <div class="p-3">
                    <div class="grid grid-cols-7 text-center mb-2">
                        <div class="text-xs font-semibold text-chume-brown-light">日</div>
                        <div class="text-xs font-semibold text-chume-brown-light">一</div>
                        <div class="text-xs font-semibold text-chume-brown-light">二</div>
                        <div class="text-xs font-semibold text-chume-brown-light">三</div>
                        <div class="text-xs font-semibold text-chume-brown-light">四</div>
                        <div class="text-xs font-semibold text-chume-brown-light">五</div>
                        <div class="text-xs font-semibold text-chume-brown-light">六</div>
                    </div>
                    <div id="calendar-days" class="grid grid-cols-7 gap-1.5"></div>
                </div>
            </section>

            <section class="mt-4 bg-white rounded-card shadow-card border border-chume-brown/10 overflow-hidden">
                <div class="px-5 py-4 border-b border-chume-brown/10 bg-chume-cream/25">
                    <h2 id="calendar-selected-date" class="text-lg font-bold text-chume-brown font-title"></h2>
                </div>

                <div class="p-5 space-y-6">
                    <div>
                        <div class="flex items-center gap-2 mb-3">
                            <i class="fas fa-heart-pulse text-chume-pink"></i>
                            <h3 class="text-sm font-bold text-chume-brown">身体摘要</h3>
                        </div>
                        <div id="calendar-health-summary" class="grid grid-cols-3 gap-2"></div>
                    </div>

                    <div>
                        <div class="flex items-center gap-2 mb-3">
                            <i class="fas fa-moon text-chume-pink"></i>
                            <h3 class="text-sm font-bold text-chume-brown">生理周期</h3>
                        </div>
                        <div class="bg-chume-orange-light rounded-2xl p-3">
                            <div id="calendar-period-status"
                                class="text-sm font-semibold text-chume-brown leading-relaxed"></div>
                            <div class="grid grid-cols-2 gap-3 mt-3">
                                <button id="calendar-period-start"
                                    class="rounded-full bg-white text-chume-brown px-3 py-2 text-sm font-semibold shadow-sm active:scale-95 transition-all">
                                    月经开始了
                                </button>
                                <button id="calendar-period-end"
                                    class="rounded-full bg-white text-chume-brown px-3 py-2 text-sm font-semibold shadow-sm active:scale-95 transition-all">
                                    月经结束了
                                </button>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-2">
                                <i class="fas fa-palette text-chume-orange"></i>
                                <h3 class="text-sm font-bold text-chume-brown">行程安排</h3>
                            </div>
                            <span class="text-[11px] text-chume-brown-light">点击颜色添加</span>
                        </div>
                        <div id="calendar-color-options" class="flex gap-1 overflow-x-auto hide-scrollbar pb-2"></div>
                        <div id="calendar-schedule-list" class="mt-3 space-y-2"></div>
                    </div>

                    <div>
                        <div class="flex items-center gap-2 mb-3">
                            <i class="fas fa-note-sticky text-chume-orange"></i>
                            <h3 class="text-sm font-bold text-chume-brown">通用备忘</h3>
                        </div>
                        <textarea id="calendar-memo"
                            class="w-full min-h-[92px] rounded-2xl bg-chume-card p-4 outline-none focus:bg-white focus:ring-2 focus:ring-chume-orange/40 text-sm text-chume-brown placeholder-chume-brown-light resize-none"
                            placeholder="写下这一天需要记住的事..."></textarea>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="utils.js"></script>
    <script src="components.js"></script>
    <script src="calendar.js"></script>
    <script>
        window.addEventListener('load', () => {
            if (window.ChuMeCalendarLogic) {
                window.ChuMeCalendarLogic.initCalendarPage();
            }
        });
    </script>
</body>

</html>
